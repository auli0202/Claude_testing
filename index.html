<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HSC VB | Master Vocab</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif+Bengali:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root{
  --bg-main:#f0f4ff; --card-bg:#fff; --text-main:#0d1117; --text-sub:#526070;
  --accent:#2563eb; --accent-soft:#dbeafe; --border:#dde4ef;
  --nav-bg:rgba(255,255,255,0.95); --correct:#16a34a; --wrong:#dc2626;
  --review:#d97706; --ex-bg:#f1f5fb;
  --shadow:0 4px 20px rgba(37,99,235,.07); --shadow-lg:0 10px 40px rgba(37,99,235,.13);
  --radius-sm:.6rem; --radius-md:1rem; --radius-lg:1.5rem; --radius-xl:2rem;
  --transition:.22s cubic-bezier(.4,0,.2,1);
}
html.dark{
  --bg-main:#0b1120; --card-bg:#141f33; --text-main:#e8f0fe; --text-sub:#8da4c0;
  --accent:#38bdf8; --accent-soft:#0c2340; --border:#1e3050;
  --nav-bg:rgba(11,17,32,0.95); --correct:#22c55e; --wrong:#f43f5e;
  --review:#fbbf24; --ex-bg:#0e1a2d;
  --shadow:0 4px 20px rgba(0,0,0,.3); --shadow-lg:0 10px 40px rgba(0,0,0,.45);
}
/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg-main);color:var(--text-main);font-family:'Plus Jakarta Sans',sans-serif;
  padding-bottom:5.5rem;line-height:1.6;overflow-x:hidden;
  transition:background var(--transition),color var(--transition);min-height:100vh}
body.no-nav{padding-bottom:1.5rem}

/* ── HEADER ── */
.header{background:var(--nav-bg);backdrop-filter:blur(18px) saturate(1.6);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);
  position:sticky;top:0;z-index:900;padding:.75rem 1rem;
  border-bottom:1px solid var(--border);
  transition:transform .35s ease,box-shadow .35s ease}
.header.header-hidden{transform:translateY(-100%);pointer-events:none}
.header:not(.header-hidden){box-shadow:var(--shadow)}
#header-show-tab{position:fixed;top:0;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:5px 22px;border-radius:0 0 14px 14px;
  font-size:.72rem;font-weight:800;z-index:901;cursor:pointer;display:none;
  box-shadow:0 4px 12px rgba(0,0,0,.2);letter-spacing:.03em}
.header-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:.7rem}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.logo{font-weight:800;font-size:1.85rem;color:var(--accent);cursor:pointer;
  letter-spacing:-.04em;user-select:none;flex-shrink:0}
.logo span{color:var(--text-main)}
.desktop-nav{display:none;gap:.2rem;flex-wrap:wrap}
.d-nav-item{background:none;border:none;color:var(--text-sub);font-weight:700;
  font-size:.82rem;cursor:pointer;padding:.38rem .75rem;border-radius:var(--radius-sm);
  transition:background var(--transition),color var(--transition);font-family:inherit}
.d-nav-item:hover,.d-nav-item.active{color:var(--accent);background:var(--accent-soft)}
.header-actions{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
.action-btn{width:2.1rem;height:2.1rem;border-radius:50%;border:1.5px solid var(--border);
  background:var(--card-bg);color:var(--text-main);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:.92rem;
  transition:background var(--transition),border-color var(--transition),transform .12s;flex-shrink:0}
.action-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
.action-btn:active{transform:scale(.9)}
.stats-row{display:flex;gap:.5rem}
.stat-chip{flex:1;height:3.4rem;border-radius:var(--radius-md);border:1.5px solid var(--border);
  background:var(--card-bg);display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;
  transition:background var(--transition),color var(--transition),transform .15s,border-color var(--transition);
  min-width:0;user-select:none}
.stat-chip:active{transform:scale(.96)}
.stat-chip .chip-label{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;opacity:.65}
.stat-chip .chip-val{font-size:1rem;font-weight:800;margin-top:1px}
.stat-chip.total{border-color:var(--accent);color:var(--accent)}
.stat-chip.m{border-color:var(--correct);color:var(--correct)}
.stat-chip.r{border-color:var(--review);color:var(--review)}
.stat-chip.total.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stat-chip.m.active{background:var(--correct);color:#fff;border-color:var(--correct)}
.stat-chip.r.active{background:var(--review);color:#fff;border-color:var(--review)}
.stat-chip.active .chip-label,.stat-chip.active .chip-val{color:#fff;opacity:1}
.progress-track{width:100%;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
#overall-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#60a5fa);
  transition:width .5s ease;border-radius:99px}

/* ── LAYOUT ── */
.main-container{max-width:1200px;margin:0 auto;padding:1rem}

/* ── CONTROLS ── */
.controls{background:var(--card-bg);padding:.75rem;border-radius:var(--radius-lg);
  border:1px solid var(--border);display:flex;flex-wrap:wrap;gap:.5rem;
  margin-bottom:1.2rem;box-shadow:var(--shadow)}
input,select,.btn{padding:.58rem .85rem;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card-bg);color:var(--text-main);
  font-size:.85rem;outline:none;font-family:inherit;
  transition:border-color var(--transition),box-shadow var(--transition)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
html.dark input:focus,html.dark select:focus{box-shadow:0 0 0 3px rgba(56,189,248,.15)}
.btn{font-weight:700;cursor:pointer}
.btn:active{transform:scale(.96)}
.btn-outline{border:2px solid var(--accent);color:var(--accent);background:transparent}
.btn-outline:hover{background:var(--accent-soft)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.9}
.btn-ok{background:var(--correct);color:#fff;border-color:var(--correct)}
.btn-danger{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.btn-warn{background:var(--review);color:#fff;border-color:var(--review)}

/* ── WORD CARDS ── */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.wcard{background:var(--card-bg);border-radius:var(--radius-xl);padding:1.15rem;
  border:1.5px solid var(--border);display:flex;flex-direction:column;
  box-shadow:var(--shadow);transition:transform var(--transition),box-shadow var(--transition);
  position:relative;overflow:hidden;cursor:pointer}
.wcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.wcard.mastered{border-left:5px solid var(--correct)}
.wcard.reviewing{border-left:5px solid var(--review)}
.wcard.is-important{background:linear-gradient(135deg,var(--card-bg) 60%,var(--ex-bg))}
.c-tag{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  background:var(--accent);color:#fff;padding:3px 9px;border-radius:99px;
  display:inline-block;margin-bottom:.8rem;align-self:flex-start}
.c-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.25rem}
.c-en{font-size:1.75rem;font-weight:800;letter-spacing:-.025em;line-height:1.1;flex:1}
.speak-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;
  padding:4px;border-radius:8px;flex-shrink:0;transition:transform .15s;color:var(--text-sub)}
.speak-btn:hover{transform:scale(1.2)}
.c-bn{font-family:'Noto Serif Bengali',serif;font-size:1.2rem;color:var(--text-main);font-weight:600;margin-bottom:.6rem}
.c-pron{font-size:.88rem;color:var(--text-sub);font-family:'Courier New',monospace;margin-bottom:.6rem;font-weight:700}
.c-ex-en{font-size:1rem;font-style:italic;color:var(--text-sub);margin-bottom:.5rem;
  padding-left:.7rem;border-left:3px solid var(--accent);line-height:1.5;font-weight:600}
.c-ex-bn{font-family:'Noto Serif Bengali',serif;font-size:1.1rem;color:var(--text-sub);
  font-weight:600;line-height:1.5;margin-bottom:.7rem;opacity:.9}
.c-family-wrap{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.c-family{font-size:.82rem;color:var(--accent);font-weight:600;background:var(--accent-soft);padding:2px 8px;border-radius:99px}
.c-actions{display:flex;gap:.5rem;margin-top:auto;border-top:1.5px solid var(--border);padding-top:.9rem}
.s-btn{flex:1;padding:.55rem;border-radius:var(--radius-sm);border:2px solid var(--border);
  font-size:.78rem;font-weight:700;cursor:pointer;background:transparent;color:var(--text-main);
  transition:background var(--transition),color var(--transition),border-color var(--transition);font-family:inherit}
.s-btn:hover{border-color:var(--text-sub)}
.s-btn.m.active{background:var(--correct);color:#fff;border-color:var(--correct)}
.s-btn.r.active{background:var(--review);color:#fff;border-color:var(--review)}
.star-badge{color:#f59e0b;font-size:1.1rem;margin-left:6px;display:inline-block;
  animation:star-pulse 2s ease-in-out infinite}
@keyframes star-pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.15);opacity:1}}
.blind-mode .c-tag,.blind-mode .c-bn,.blind-mode .c-ex-en,.blind-mode .c-pron,
.blind-mode .c-ex-bn,.blind-mode .c-family-wrap,.blind-mode .c-actions{display:none!important}
.blind-mode .wcard{min-height:5rem;justify-content:center}

/* ── PAGINATION ── */
.pagination{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:.4rem;margin:1.5rem 0 .5rem}
.jump-box{display:flex;align-items:center;gap:.3rem}
.jump-box input{width:42px;text-align:center;padding:.4rem;font-weight:800;color:var(--accent)}

/* ── FLASHCARDS ── */
.fc-wrap{width:100%;max-width:440px;margin:0 auto}
.fc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.fc-counter{font-size:.82rem;font-weight:700;color:var(--text-sub)}
.session-progress-wrap{width:100%;height:7px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1.1rem}
#session-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#60a5fa);
  border-radius:99px;transition:width .4s ease}
.flip-card{background:var(--card-bg);height:60vh;max-height:480px;min-height:340px;
  border-radius:var(--radius-xl);border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:1.5rem;cursor:pointer;position:relative;
  box-shadow:var(--shadow-lg);overflow:hidden;
  transition:transform .18s,box-shadow .18s;user-select:none}
.flip-card:active{transform:scale(.985)}
.flip-card .fc-hint{position:absolute;bottom:1.2rem;font-size:.78rem;color:var(--text-sub);font-weight:600}
.fc-en-text{font-size:clamp(1.8rem,9vw,3rem);font-weight:800;width:100%;word-break:break-word;line-height:1.1;letter-spacing:-.02em}
.fc-bn-text{font-family:'Noto Serif Bengali',serif;font-size:clamp(1.3rem,7vw,2.2rem);line-height:1.3;width:100%;font-weight:700}
.fc-detail-box{margin-top:1rem;padding:.9rem 1rem;background:var(--ex-bg);border-radius:var(--radius-md);width:100%;max-height:45%;overflow-y:auto}
.fc-ex-en-small{font-size:clamp(.9rem,3.5vw,1.1rem);font-style:italic;color:var(--text-sub);line-height:1.4;font-weight:600}
.fc-ex-bn-small{font-family:'Noto Serif Bengali',serif;font-size:clamp(.9rem,3.5vw,1.1rem);
  color:var(--accent);font-weight:700;display:block;margin-top:6px}
.fc-speak-btn{position:absolute;top:1rem;right:1rem;font-size:1.6rem;background:none;
  border:none;cursor:pointer;z-index:5;transition:transform .15s}
.fc-speak-btn:hover{transform:scale(1.2)}
.fc-nav{display:flex;justify-content:center;gap:.75rem;margin-top:1.2rem}
.fc-nav-btn{flex:1;max-width:150px;height:3.2rem;font-size:.88rem;font-weight:800;letter-spacing:.05em;border-radius:var(--radius-md)}
/* FC self-rate */
.fc-rate-row{display:flex;gap:.5rem;margin-top:.75rem;justify-content:center}
.fc-rate-btn{flex:1;max-width:120px;height:2.8rem;font-size:.8rem;font-weight:800;
  border-radius:var(--radius-md);border:2px solid var(--border);background:var(--card-bg);
  color:var(--text-main);cursor:pointer;transition:background var(--transition),color var(--transition);font-family:inherit}
.fc-rate-btn.easy{border-color:var(--correct);color:var(--correct)}
.fc-rate-btn.easy:hover{background:var(--correct);color:#fff}
.fc-rate-btn.hard{border-color:var(--review);color:var(--review)}
.fc-rate-btn.hard:hover{background:var(--review);color:#fff}
.fc-rate-btn.skip{border-color:var(--text-sub);color:var(--text-sub)}
.fc-rate-btn.skip:hover{background:var(--text-sub);color:#fff}

/* ── QUIZ ── */
.quiz-card{background:var(--card-bg);padding:1.5rem;border-radius:var(--radius-xl);
  border:2px solid var(--border);max-width:620px;margin:0 auto;box-shadow:var(--shadow-lg)}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:.5rem}
.quiz-qnum{font-size:.82rem;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:4px 12px;border-radius:99px;flex-shrink:0}
.quiz-score-b{font-size:.82rem;font-weight:700;color:var(--correct);background:rgba(22,163,74,.1);padding:4px 12px;border-radius:99px;flex-shrink:0}
.quiz-timer{font-size:.9rem;font-weight:800;padding:4px 12px;border-radius:99px;min-width:54px;text-align:center;transition:background .3s,color .3s;flex-shrink:0}
.quiz-timer.ok{color:var(--correct);background:rgba(22,163,74,.1)}
.quiz-timer.warn{color:var(--review);background:rgba(217,119,6,.12)}
.quiz-timer.danger{color:var(--wrong);background:rgba(220,38,38,.12);animation:pulse-timer .5s ease infinite alternate}
@keyframes pulse-timer{from{transform:scale(1)}to{transform:scale(1.08)}}
.quiz-direction{font-size:.75rem;color:var(--text-sub);font-weight:700;letter-spacing:.04em;margin-bottom:.5rem}
.quiz-word{font-size:clamp(1.5rem,6vw,2.2rem);font-weight:800;letter-spacing:-.03em;margin-bottom:1.1rem;line-height:1.1}
.quiz-word.bn{font-family:'Noto Serif Bengali',serif;letter-spacing:0}
.q-opt{width:100%;padding:1rem 1.1rem;margin-top:.7rem;border-radius:var(--radius-md);
  border:2px solid var(--border);background:var(--ex-bg);color:var(--text-main);
  font-family:'Noto Serif Bengali',serif;font-size:1.08rem;text-align:left;cursor:pointer;
  transition:border-color var(--transition),background var(--transition),transform var(--transition)}
.q-opt.en-opt{font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem}
.q-opt:hover:not(.correct):not(.wrong){border-color:var(--accent);transform:translateX(4px);background:var(--accent-soft)}
.q-opt.correct{background:var(--correct)!important;color:#fff!important;border-color:var(--correct)!important}
.q-opt.wrong{background:var(--wrong)!important;color:#fff!important;border-color:var(--wrong)!important}
.quiz-progress-wrap{width:100%;height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1rem}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);border-radius:99px;transition:width .4s ease}
.quiz-score-screen{text-align:center;padding:2.5rem 1rem;background:var(--card-bg);border-radius:var(--radius-xl);
  border:2px solid var(--border);box-shadow:var(--shadow-lg);max-width:500px;margin:0 auto}
.quiz-score-screen h1{font-size:3.5rem;margin-bottom:.5rem}
.quiz-score-screen h2{font-size:1.5rem;font-weight:800;margin-bottom:.5rem}
.wrong-review-list{margin-top:1.2rem;max-height:220px;overflow-y:auto;text-align:left;
  border:1.5px solid var(--border);border-radius:var(--radius-md);padding:.5rem}
.wrong-review-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .3rem;
  border-bottom:1px solid var(--border);font-size:.88rem}
.wrong-review-item:last-child{border-bottom:none}
.wrong-review-item .wr-en{font-weight:800;flex:1}
.wrong-review-item .wr-bn{font-family:'Noto Serif Bengali',serif;font-size:.95rem;color:var(--text-sub)}

/* ── SPELLING TEST ── */
.spell-card{background:var(--card-bg);padding:1.5rem;border-radius:var(--radius-xl);
  border:2px solid var(--border);max-width:560px;margin:0 auto;box-shadow:var(--shadow-lg);text-align:center}
.spell-clue{font-family:'Noto Serif Bengali',serif;font-size:1.7rem;font-weight:700;margin-bottom:.4rem}
.spell-pron{font-family:monospace;font-size:.95rem;color:var(--text-sub);font-weight:700;margin-bottom:.3rem}
.spell-ex{font-size:.9rem;font-style:italic;color:var(--text-sub);margin-bottom:1rem;line-height:1.4;font-weight:600}
.letter-boxes{display:flex;justify-content:center;gap:.3rem;flex-wrap:wrap;margin-bottom:1rem}
.letter-box{width:2.2rem;height:2.6rem;border-radius:.5rem;border:2px solid var(--border);
  background:var(--card-bg);display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:800;transition:all .2s}
.letter-box.revealed{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.letter-box.correct-box{background:rgba(22,163,74,.12);border-color:var(--correct);color:var(--correct)}
.letter-box.wrong-box{background:rgba(220,38,38,.1);border-color:var(--wrong);color:var(--wrong)}
.spell-input{width:100%;font-size:1.3rem;font-weight:700;text-align:center;padding:.75rem;
  border-radius:var(--radius-md);border:2px solid var(--border);background:var(--ex-bg);
  color:var(--text-main);letter-spacing:.05em;margin-bottom:.75rem;transition:border-color .2s}
.spell-input.correct-inp{border-color:var(--correct)!important;background:rgba(22,163,74,.06)!important}
.spell-input.wrong-inp{border-color:var(--wrong)!important;background:rgba(220,38,38,.06)!important}
.spell-result{font-size:1rem;font-weight:700;margin-bottom:.75rem;min-height:1.5rem}
.spell-result.ok{color:var(--correct)} .spell-result.no{color:var(--wrong)}
.spell-score-row{display:flex;justify-content:center;gap:1.5rem;margin-bottom:.8rem}
.spell-stat{text-align:center}
.spell-stat span:first-child{display:block;font-size:.6rem;font-weight:800;text-transform:uppercase;opacity:.6}
.spell-stat span:last-child{font-size:1.4rem;font-weight:800}

/* ── STUDY MODE ── */
.study-card{background:var(--card-bg);border-radius:var(--radius-xl);border:2px solid var(--border);
  max-width:560px;margin:0 auto;box-shadow:var(--shadow-lg);overflow:hidden}
.study-front{padding:2rem;text-align:center;border-bottom:2px solid var(--border)}
.study-back{padding:1.5rem;background:var(--ex-bg)}
.study-word{font-size:clamp(2rem,10vw,3rem);font-weight:800;letter-spacing:-.03em;margin-bottom:.4rem;line-height:1.1}
.study-pron{font-family:monospace;font-size:1rem;color:var(--text-sub);font-weight:700;margin-bottom:.6rem}
.study-rate-row{display:flex;gap:.5rem;justify-content:center;margin-top:1.2rem;flex-wrap:wrap}
.study-rate-btn{flex:1;min-width:90px;max-width:140px;padding:.65rem .5rem;border-radius:var(--radius-md);
  border:2px solid var(--border);font-size:.82rem;font-weight:800;cursor:pointer;
  background:var(--card-bg);color:var(--text-main);transition:background var(--transition),color var(--transition);font-family:inherit}
.study-rate-btn.know{border-color:var(--correct);color:var(--correct)}
.study-rate-btn.know:hover{background:var(--correct);color:#fff}
.study-rate-btn.unsure{border-color:var(--review);color:var(--review)}
.study-rate-btn.unsure:hover{background:var(--review);color:#fff}
.study-rate-btn.dontknow{border-color:var(--wrong);color:var(--wrong)}
.study-rate-btn.dontknow:hover{background:var(--wrong);color:#fff}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem;margin-bottom:1.1rem}
.dash-tile{background:var(--card-bg);border-radius:var(--radius-lg);padding:1rem;
  border:1.5px solid var(--border);box-shadow:var(--shadow);text-align:center}
.dt-icon{font-size:1.7rem;margin-bottom:.3rem}
.dt-val{font-size:1.7rem;font-weight:800;line-height:1}
.dt-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-sub);margin-top:.25rem}
.dash-section{background:var(--card-bg);border-radius:var(--radius-lg);padding:1.1rem;
  border:1.5px solid var(--border);box-shadow:var(--shadow);margin-bottom:1rem}
.dash-section-title{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text-sub);margin-bottom:.85rem}
/* Goal */
.goal-bar-wrap{height:12px;background:var(--border);border-radius:99px;overflow:hidden;margin:.5rem 0}
.goal-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#60a5fa);transition:width .5s ease}
.goal-bar-fill.done{background:linear-gradient(90deg,var(--correct),#4ade80)}
/* Category bars */
.cat-bar-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.6rem}
.cat-bar-label{font-size:.75rem;font-weight:700;min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-bar-track{flex:1;height:9px;background:var(--border);border-radius:99px;overflow:hidden}
.cat-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);border-radius:99px;transition:width .6s ease}
.cat-bar-fill.done{background:linear-gradient(90deg,var(--correct),#4ade80)}
.cat-bar-pct{font-size:.7rem;font-weight:800;color:var(--text-sub);min-width:30px;text-align:right}
/* Streak flame */
.streak-flame{animation:flame 1.2s ease-in-out infinite alternate}
@keyframes flame{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.12) rotate(3deg)}}
/* Recent words */
.rw-item{display:flex;align-items:center;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border)}
.rw-item:last-child{border-bottom:none}
.rw-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rw-dot.m{background:var(--correct)}.rw-dot.r{background:var(--review)}
.rw-en{font-weight:700;font-size:.88rem;flex:1}
.rw-bn{font-family:'Noto Serif Bengali',serif;font-size:.85rem;color:var(--text-sub)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;

.modal-overlay.open{opacity:1;pointer-events:auto}

.modal-overlay.open .modal-box{transform:none}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;

.modal-word{font-size:2.2rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.2rem}
.modal-pron{font-family:monospace;font-size:1rem;color:var(--text-sub);font-weight:700;margin-bottom:.6rem}
.modal-bn{font-family:'Noto Serif Bengali',serif;font-size:1.5rem;font-weight:700;margin-bottom:.8rem}
.modal-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-sub);margin-bottom:.3rem}
.modal-block{margin-bottom:.9rem}

/* ── TOAST ── */
#toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:10px 22px;border-radius:99px;
  font-size:.82rem;opacity:0;transition:opacity .3s;z-index:2000;
  font-weight:600;pointer-events:none;white-space:nowrap;max-width:90vw;
  box-shadow:0 4px 16px rgba(0,0,0,.25)}
html.dark #toast{background:#e2e8f0;color:#0f172a}

/* ── EMPTY / SKELETON ── */
.empty-state{grid-column:1/-1;text-align:center;padding:4rem 1rem;opacity:.5}
.empty-state h3{font-size:1.2rem;font-weight:800;margin-bottom:.4rem}
.skeleton-card{background:var(--card-bg);border-radius:var(--radius-xl);padding:1.15rem;
  border:1.5px solid var(--border);height:200px;overflow:hidden;position:relative}
.skeleton-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  animation:shimmer 1.4s infinite}
html.dark .skeleton-card::after{background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:4.6rem;
  background:var(--nav-bg);backdrop-filter:blur(18px) saturate(1.5);
  -webkit-backdrop-filter:blur(18px) saturate(1.5);
  border-top:1px solid var(--border);display:flex;justify-content:space-around;
  align-items:center;z-index:800;
  transition:transform .35s cubic-bezier(.4,0,.2,1);

.bottom-nav.nav-hidden{transform:translateY(110%);pointer-events:none}
.nav-item{border:none;background:none;display:flex;flex-direction:column;
  align-items:center;color:var(--text-sub);flex:1;cursor:pointer;padding:.35rem 0;
  transition:color var(--transition);font-family:inherit}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:1.2rem;line-height:1}

/* ── RESPONSIVE ── */

<script>
'use strict';

/* ══ STATE ══════════════════════════════════════════════════════ */
let vocab    = [];
let progress = JSON.parse(localStorage.getItem('hscEliteData') || '{}');
let srsData  = JSON.parse(localStorage.getItem('hscSRS')       || '{}');
let dailyLog = JSON.parse(localStorage.getItem('hscDaily')     || '{}');

let curPg = 1;
const pgSize = 18;
let isBlindMode = false;
let currentFontSize = parseInt(localStorage.getItem('hscEliteFont')) || 16;

let fcList = [], fcIdx = 0, fcFlipped = false;
let qList  = [], qIdx  = 0, qScore   = 0, qWrong = [];
let qTimerInt = null, qTimerSec = 0;
let spellList = [], spellIdx = 0, spellOk = 0, spellNo = 0, spellHints = 0;
let studyList = [], studyIdx  = 0, studyShown = false;

const TODAY = new Date().toDateString();

/* ══ DAILY GOAL & STREAK ════════════════════════════════════════ */
function goalTarget(){ return parseInt(document.getElementById('goal-sel')?.value || '10'); }

function recordStudied(en){
  if(!dailyLog[TODAY]) dailyLog[TODAY] = [];
  if(!dailyLog[TODAY].includes(en)) dailyLog[TODAY].push(en);
  localStorage.setItem('hscDaily', JSON.stringify(dailyLog));
  if(document.getElementById('v-dash') && !document.getElementById('v-dash').classList.contains('hidden'))
    renderDashboard();
}

function calcStreak(){
  let s = 0, d = new Date();
  // count today if goal met
  if((dailyLog[TODAY]||[]).length >= goalTarget()) s++;
  d.setDate(d.getDate()-1);
  while(true){
    const k = d.toDateString();
    if((dailyLog[k]||[]).length >= goalTarget()){ s++; d.setDate(d.getDate()-1); }
    else break;
  }
  return s;
}

/* ══ SRS (Spaced Repetition) ════════════════════════════════════ */
function srsRate(en, quality){ // quality: 2=easy, 1=hard, 0=fail
  if(!srsData[en]) srsData[en] = {interval:1, ease:2.5, next:Date.now()};
  const s = srsData[en];
  if(quality >= 1){
    s.interval = s.interval===1 ? 4 : s.interval===4 ? 10 : Math.round(s.interval * s.ease);
    s.ease = Math.max(1.3, s.ease + 0.1 - (3 - quality) * 0.08);
  } else {
    s.interval = 1;
    s.ease = Math.max(1.3, s.ease - 0.2);
  }
  s.next = Date.now() + s.interval * 86400000;
  localStorage.setItem('hscSRS', JSON.stringify(srsData));
}
function srsDue(en){ return !srsData[en] || Date.now() >= srsData[en].next; }

/* ══ UTILS ══════════════════════════════════════════════════════ */
function triggerHaptic(){ if(navigator.vibrate) navigator.vibrate(12); }
function showToast(msg, dur=2600){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', dur);
}
function speak(text){
  if(!window.speechSynthesis){ showToast('Speech not supported'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

/* ══ CSV PARSER ════════════════════════════════════════════════ */
// Columns: en | pron | bn | family | cat | ex_en | ex_bn | star
function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const data = [];
  for(let i=1; i<lines.length; i++){
    const row=[]; let cell='', inQ=false;
    for(const ch of lines[i]){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){row.push(cell.trim());cell='';}
      else cell+=ch;
    }
    row.push(cell.trim());
    if(row[0]&&row[2]){
      data.push({
        en:row[0], pron:row[1]||'', bn:row[2],
        family:row[3]||'', cat:row[4]||'Misc',
        ex_en:row[5]||'', ex_bn:row[6]||'',
        important:parseInt(row[7])||0
      });
    }
  }
  return data;
}

  document.getElementById('grid-browse').innerHTML = Array(8).fill('<div class="skeleton-card"></div>').join('');

}

/* ══ BROWSE ══════════════════════════════════════════════════════ */
function renderBrowse(scroll=true){
  const q   = document.getElementById('search-input').value.toLowerCase().trim();
  const cat = document.getElementById('f-cat').value;
  const st  = document.getElementById('f-status').value;
  const srt = document.getElementById('f-sort').value;

  let f = vocab.filter(v => {
    const ms = v.en.toLowerCase().includes(q)||v.bn.includes(q)||v.pron.toLowerCase().includes(q)||v.family.toLowerCase().includes(q);
    const mc = !cat||v.cat===cat;
    const mst = !st||(st==='new'&&!progress[v.en])||(st!=='new'&&progress[v.en]===st);
    return ms&&mc&&mst;
  });
  if(srt==='newest') f=[...f].reverse();
  else if(srt==='az') f=[...f].sort((a,b)=>a.en.localeCompare(b.en));
  else if(srt==='important') f=[...f].sort((a,b)=>b.important-a.important);

  const tp = Math.ceil(f.length/pgSize)||1;
  curPg = Math.min(curPg, tp);
  const slice = f.slice((curPg-1)*pgSize, curPg*pgSize);
  const grid = document.getElementById('grid-browse');
  grid.innerHTML = slice.length
    ? slice.map(v=>createCard(v)).join('')
    : `<div class="empty-state"><h3>No words found</h3><p>Try a different search or filter.</p></div>`;
  renderPag(tp, f.length);
  if(scroll) window.scrollTo(0,0);
}

/* ══ PAGINATION ══════════════════════════════════════════════════ */
function renderPag(total, count){
  const box = document.getElementById('pag-box');
  if(total<=1){ box.innerHTML = count?`<small style="color:var(--text-sub);font-weight:600">${count} word${count>1?'s':''} found</small>`:''; return; }
  let html = `<small style="color:var(--text-sub);font-weight:600;margin-right:.5rem">${count} words</small>`;
  html += `<div class="jump-box"><input type="number" id="jump-in" min="1" max="${total}" value="${curPg}">
    <span style="font-size:.8rem;color:var(--text-sub)">/${total}</span>
    <button class="btn btn-primary" style="padding:4px 10px;font-size:.75rem" onclick="doJump(${total})">Go</button></div>`;
  for(let i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-curPg)<=1)
      html+=`<button class="btn ${i===curPg?'btn-primary':'btn-outline'}" style="min-width:34px;padding:5px 6px;font-size:.82rem" onclick="setPg(${i})">${i}</button>`;
    else if(Math.abs(i-curPg)===2) html+=`<span style="opacity:.35">…</span>`;
  }
  box.innerHTML = html;
}
function setPg(p){ triggerHaptic(); curPg=p; renderBrowse(); }
function doJump(max){ const p=parseInt(document.getElementById('jump-in').value); if(p>=1&&p<=max)setPg(p); }

  const area = document.getElementById('study-area');
  if(studyIdx >= studyList.length){
    area.innerHTML=`<div class="quiz-score-screen"><h1>📚</h1><h2>Session Complete!</h2>
      <p style="color:var(--text-sub);margin-bottom:1.2rem">${studyList.length} words reviewed</p>
      <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="initStudy()">🔄 Again</button>
        <button class="btn btn-outline" onclick="showV('dash')">📊 Dashboard</button>
      </div></div>`;
    return;
  }
  const v = studyList[studyIdx];
  const fam = v.family ? v.family.split(',').map(f=>`<span class="c-family">${f.trim()}</span>`).join('') : '';
  const pctW = (studyIdx/studyList.length*100).toFixed(0);
  area.innerHTML=`
    <div style="max-width:560px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem">
        <span style="font-size:.82rem;font-weight:700;color:var(--text-sub)">${studyIdx+1} / ${studyList.length}</span>
        <span class="c-tag">${v.cat}</span>
      </div>
      <div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:${pctW}%"></div></div>
      <div class="study-card">
        <div class="study-front">
          <div class="study-word">${v.en}${v.important>=4?'<span class="star-badge">★</span>':''}</div>
          ${v.pron?`<div class="study-pron">/${v.pron}/</div>`:''}
          <button onclick="speak('${esc(v.en)}')" style="background:none;border:none;font-size:1.5rem;cursor:pointer;margin-top:.3rem">🔊</button>
          ${!studyShown?`<div style="margin-top:1rem"><button class="btn btn-primary" onclick="revealStudy()">👁 Show Meaning</button></div>`:''}
        </div>
        ${studyShown?`<div class="study-back">
          <div style="font-family:'Noto Serif Bengali',serif;font-size:1.5rem;font-weight:700;margin-bottom:.6rem">${v.bn}</div>
          ${v.ex_en?`<div style="font-size:.95rem;font-style:italic;color:var(--text-sub);line-height:1.5;margin-bottom:.5rem;border-left:3px solid var(--accent);padding-left:.7rem;font-weight:600">${v.ex_en}</div>`:''}
          ${v.ex_bn?`<div style="font-family:'Noto Serif Bengali',serif;font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:.6rem">${v.ex_bn}</div>`:''}
          ${fam?`<div class="c-family-wrap">${fam}</div>`:''}
          <div class="study-rate-row">
            <button class="study-rate-btn know"     onclick="studyRate(2)">✅ Know it</button>
            <button class="study-rate-btn unsure"   onclick="studyRate(1)">🤔 Unsure</button>
            <button class="study-rate-btn dontknow" onclick="studyRate(0)">❌ Don't know</button>
          </div>
        </div>`:''}
      </div>
    </div>`;
}
function revealStudy(){ studyShown=true; renderStudy(); }
function studyRate(q){
  triggerHaptic();
  const v = studyList[studyIdx];
  srsRate(v.en, q);
  progress[v.en] = q>=2 ? 'm' : 'r';
  recordStudied(v.en);
  updateStats();
  studyIdx++; studyShown=false; renderStudy();
}

/* ══ QUIZ (timed, EN↔BN, wrong-word review) ══════════════════════ */
function clearQuizTimer(){ clearInterval(qTimerInt); qTimerInt=null; }
function startQuiz(){
  triggerHaptic(); clearQuizTimer();
  const cat   = document.getElementById('quiz-cat').value;
  const count = parseInt(document.getElementById('quiz-count').value)||10;
  const mode  = document.getElementById('quiz-mode').value;
  const pool  = vocab.filter(v=>!cat||v.cat===cat);
  if(pool.length<4){ showToast('Need at least 4 words.'); return; }
  const actual = Math.min(count, pool.length);
  qList = pool.sort(()=>Math.random()-.5).slice(0,actual).map(cor=>{
    const wrongs = pool.filter(p=>p.en!==cor.en).sort(()=>Math.random()-.5).slice(0,3);
    const opts = [cor,...wrongs].sort(()=>Math.random()-.5);
    const dir  = mode==='mixed' ? (Math.random()>.5?'bn':'en') : mode;
    return {cor, opts, dir};
  });
  qIdx=0; qScore=0; qWrong=[];
  renderQuiz();
}
function renderQuiz(){
  clearQuizTimer();
  const area = document.getElementById('quiz-area');
  if(qIdx >= qList.length){
    const pct = Math.round(qScore/qList.length*100);
    const emoji = pct>=80?'🎯':pct>=50?'💪':'📖';
    const msg   = pct>=80?'Excellent!':pct>=50?'Good effort!':'Keep practising!';
    const wrongHTML = qWrong.length ? `
      <div style="text-align:left;margin-top:1rem">
        <div style="font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-sub);margin-bottom:.5rem">❌ Wrong Answers (${qWrong.length})</div>
        <div class="wrong-review-list">
          ${qWrong.map(w=>`<div class="wrong-review-item">
            <span class="wr-en">${w.en}</span>
            <span class="wr-bn">${w.bn}</span>
            <button onclick="speak('${esc(w.en)}')" style="background:none;border:none;font-size:.95rem;cursor:pointer">🔊</button>
          </div>`).join('')}
        </div>
      </div>` : '';
    area.innerHTML=`<div class="quiz-score-screen">
      <h1>${emoji}</h1><h2>${msg}</h2>
      <p style="color:var(--text-sub);margin-bottom:.8rem">Score: <strong>${qScore} / ${qList.length}</strong> (${pct}%)</p>
      ${wrongHTML}
      <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;margin-top:1.2rem">
        <button class="btn btn-primary" onclick="startQuiz()">🔄 Retry</button>
        <button class="btn btn-outline" onclick="showV('study')">📖 Study</button>
        <button class="btn btn-outline" onclick="showV('browse')">📚 Browse</button>
      </div></div>`;
    return;
  }
  const q   = qList[qIdx];
  const pct = (qIdx/qList.length*100).toFixed(0);
  const timerSecs = parseInt(document.getElementById('quiz-timer-sel').value)||0;
  const isBN = q.dir==='bn'; // show English, pick Bengali
  const questionText = isBN ? q.cor.en : q.cor.bn;
  const questionClass = isBN ? '' : 'bn';
  const optHTML = q.opts.map(o=>{
    const label = isBN ? o.bn : o.en;
    const cls   = isBN ? '' : 'en-opt';
    return `<div class="q-opt ${cls}" onclick="checkQ(this,${o.en===q.cor.en},'${esc(q.cor.bn)}')">${label}</div>`;
  }).join('');
  area.innerHTML=`<div class="quiz-card">
    <div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-header">
      <span class="quiz-qnum">Q ${qIdx+1} / ${qList.length}</span>
      ${timerSecs?`<span class="quiz-timer ok" id="q-timer">${timerSecs}s</span>`:''}
      <span class="quiz-score-b">✅ ${qScore}</span>
    </div>
    <div class="quiz-direction">${isBN?'English → বাংলা':'বাংলা → English'}</div>
    <div class="quiz-word ${questionClass}">${questionText}</div>
    <div id="q-opts">${optHTML}</div>
  </div>`;

  if(timerSecs){
    qTimerSec = timerSecs;
    qTimerInt = setInterval(()=>{
      qTimerSec--;
      const el = document.getElementById('q-timer');
      if(!el){ clearQuizTimer(); return; }
      el.textContent = qTimerSec+'s';
      el.className = 'quiz-timer '+(qTimerSec>7?'ok':qTimerSec>3?'warn':'danger');
      if(qTimerSec<=0){
        clearQuizTimer();
        const opts = document.getElementById('q-opts');
        if(opts&&!opts.dataset.locked){
          opts.dataset.locked='1';
          qWrong.push(qList[qIdx].cor);
          const corText = qList[qIdx].dir==='bn' ? qList[qIdx].cor.bn : qList[qIdx].cor.en;
          opts.querySelectorAll('.q-opt').forEach(o=>{ if(o.textContent.trim()===corText.trim()) o.classList.add('correct'); });
          showToast('⏱️ Time up!',1000);
          setTimeout(()=>{qIdx++;renderQuiz();},1300);
        }
      }
    },1000);
  }
}
function checkQ(btn, isCor, corBn){
  triggerHaptic(); clearQuizTimer();
  const cont = document.getElementById('q-opts');
  if(cont.dataset.locked) return;
  cont.dataset.locked='1';
  if(isCor){ btn.classList.add('correct'); qScore++; recordStudied(qList[qIdx].cor.en); }
  else{
    btn.classList.add('wrong');
    qWrong.push(qList[qIdx].cor);
    const q = qList[qIdx];
    const corText = q.dir==='bn' ? q.cor.bn : q.cor.en;
    cont.querySelectorAll('.q-opt').forEach(o=>{ if(o.textContent.trim()===corText.trim()) o.classList.add('correct'); });
  }
  setTimeout(()=>{qIdx++;renderQuiz();},1300);
}

/* ══ SPELLING TEST ═══════════════════════════════════════════════ */
function initSpell(){
  triggerHaptic();
  const cat = document.getElementById('spell-cat').value;
  const fltr = document.getElementById('spell-filter').value;
  let pool = vocab.filter(v=>!cat||v.cat===cat);
  if(fltr==='review') pool=pool.filter(v=>progress[v.en]==='r');
  else if(fltr==='important') pool=pool.filter(v=>v.important>=4);
  else if(fltr==='new') pool=pool.filter(v=>!progress[v.en]);
  if(!pool.length){ showToast('No words found.'); return; }
  spellList = pool.sort(()=>Math.random()-.5);
  spellIdx=0; spellOk=0; spellNo=0; spellHints=0;
  renderSpell();
}
function renderSpell(){
  const area = document.getElementById('spell-area');
  if(spellIdx >= spellList.length){
    const tot = spellOk+spellNo;
    const pct = tot ? Math.round(spellOk/tot*100) : 0;
    area.innerHTML=`<div class="quiz-score-screen">
      <h1>${pct>=80?'🎯':pct>=50?'✍️':'📖'}</h1>
      <h2>${pct>=80?'Excellent!':pct>=50?'Good job!':'Keep practising!'}</h2>
      <div class="spell-score-row" style="margin-bottom:1.2rem">
        <div class="spell-stat"><span>Correct</span><span style="color:var(--correct)">${spellOk}</span></div>
        <div class="spell-stat"><span>Wrong</span><span style="color:var(--wrong)">${spellNo}</span></div>
        <div class="spell-stat"><span>Score</span><span style="color:var(--accent)">${pct}%</span></div>
      </div>
      <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="initSpell()">🔄 Retry</button>
        <button class="btn btn-outline" onclick="showV('browse')">📚 Browse</button>
      </div></div>`;
    return;
  }
  const v = spellList[spellIdx];
  const boxes = v.en.split('').map((_,i)=>`<div class="letter-box" id="lb-${i}">_</div>`).join('');
  const pctW = (spellIdx/spellList.length*100).toFixed(0);
  area.innerHTML=`<div class="spell-card">
    <div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:${pctW}%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
      <span class="quiz-qnum">${spellIdx+1} / ${spellList.length}</span>
      <span style="font-size:.82rem;font-weight:700;color:var(--correct)">✅ ${spellOk}</span>
      <span style="font-size:.82rem;font-weight:700;color:var(--wrong)">❌ ${spellNo}</span>
    </div>
    <div class="spell-clue">${v.bn}</div>
    ${v.pron?`<div class="spell-pron">/${v.pron}/</div>`:''}
    ${v.ex_en?`<div class="spell-ex">${v.ex_en}</div>`:''}
    <div class="letter-boxes">${boxes}</div>
    <input class="spell-input" id="spell-inp" type="text"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      placeholder="Type the English word…">
    <div class="spell-result" id="spell-res"></div>
    <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:.7rem">
      <button class="btn btn-primary" onclick="checkSpell()">✔ Check</button>
      <button class="btn btn-outline" onclick="hintSpell()">💡 Hint</button>
      <button class="btn" style="border:1.5px solid var(--border)" onclick="skipSpell()">⏭ Skip</button>
    </div>
    <button onclick="speak('${esc(v.en)}')" style="background:none;border:none;font-size:.95rem;cursor:pointer;color:var(--text-sub)">🔊 Hear the word</button>
  </div>`;
  const inp = document.getElementById('spell-inp');
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') checkSpell(); });
  // live letter hint as user types
  inp.addEventListener('input', ()=>{
    const val = inp.value;
    v.en.split('').forEach((_,i)=>{
      const lb = document.getElementById('lb-'+i);
      if(!lb) return;
      if(val[i]===undefined){ lb.textContent='_'; lb.className='letter-box'; }
      else if(val[i].toLowerCase()===v.en[i].toLowerCase()){ lb.textContent=v.en[i]; lb.className='letter-box correct-box'; }
      else{ lb.textContent=val[i]; lb.className='letter-box wrong-box'; }
    });
  });
  inp.focus();
}
function hintSpell(){
  triggerHaptic();
  const v = spellList[spellIdx];
  spellHints++;
  for(let i=0;i<Math.min(spellHints,v.en.length);i++){
    const lb = document.getElementById('lb-'+i);
    if(lb){ lb.textContent=v.en[i]; lb.className='letter-box revealed'; }
  }
  const inp = document.getElementById('spell-inp');
  if(inp) inp.value = v.en.slice(0,spellHints);
}
function checkSpell(){
  triggerHaptic();
  const v = spellList[spellIdx];
  const inp = document.getElementById('spell-inp');
  const res = document.getElementById('spell-res');
  const val = inp.value.trim().toLowerCase();
  if(val === v.en.toLowerCase()){
    inp.className='spell-input correct-inp';
    res.textContent='✅ Correct!'; res.className='spell-result ok';
    spellOk++;
    recordStudied(v.en);
    v.en.split('').forEach((_,i)=>{ const lb=document.getElementById('lb-'+i); if(lb){lb.textContent=v.en[i];lb.className='letter-box correct-box';} });
    setTimeout(()=>{ spellIdx++; spellHints=0; renderSpell(); },1100);
  } else {
    inp.className='spell-input wrong-inp';
    res.textContent=`❌ Answer: ${v.en}`; res.className='spell-result no';
    spellNo++;
    setTimeout(()=>{ spellIdx++; spellHints=0; renderSpell(); },1600);
  }
}
function skipSpell(){ triggerHaptic(); spellHints=0; spellIdx++; renderSpell(); }

/* ══ SAVED / LIBRARY ═════════════════════════════════════════════ */
function renderSaved(){
  const list = vocab.filter(v=>progress[v.en]);
  const grid = document.getElementById('grid-saved');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state"><h3>📭 Library is empty</h3><p>Mark words as Mastered or Review to add them here.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(v=>createCard(v)).join('');
}

/* ══ EXPORT ══════════════════════════════════════════════════════ */
function exportProgress(){
  triggerHaptic();
  const entries = Object.entries(progress);
  if(!entries.length){ showToast('No progress to export.'); return; }
  const rows = ['Word,Bengali,Pronunciation,Category,Status'];
  entries.forEach(([en,st])=>{
    const v = vocab.find(x=>x.en===en);
    rows.push(`"${en}","${v?v.bn:''}","${v?v.pron:''}","${v?v.cat:''}","${st}"`);
  });
  const blob = new Blob([rows.join('\n')],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hscvb-progress.csv';
  a.click();
  showToast('✅ Progress exported!');
}

/* ══ RESET ═══════════════════════════════════════════════════════ */
function clearProg(){
  triggerHaptic();
  if(confirm('Reset ALL progress and SRS data? This cannot be undone.')){
    progress={}; srsData={};
    localStorage.removeItem('hscSRS');
    updateStats(); renderBrowse(); renderSaved();
    showToast('All progress reset.');
  }
}

/* ══ INIT ════════════════════════════════════════════════════════ */
window.onload = loadData;
</script>
